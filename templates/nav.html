<nav class="bg-[#0b0e14] border-b border-gray-800 px-6 py-2 flex items-center justify-between">
    <div class="flex items-center gap-4">
        <a href="{{ url_for('index') }}" class="font-mono font-bold text-green-400 text-lg tracking-tighter hover:text-green-300">
            > 1337_NOTES
        </a>
    </div>

    {% if session.get('user_id') %}
    <div class="flex-1 max-w-lg mx-12">
        <div class="relative group">
            <span class="absolute left-3 top-2 text-green-500 font-mono text-sm opacity-50 group-focus-within:opacity-100">$</span>
            <input type="search" 
                   name="q" 
                   placeholder="grep notes..." 
                   class="w-full bg-[#161b22] border border-gray-700 focus:border-green-500 focus:ring-1 focus:ring-green-500/20 rounded py-1.5 pl-8 text-gray-300 font-mono text-sm transition-all"
                   hx-get="/search" 
                   hx-trigger="keyup delay:300ms, search" 
                   hx-target="#new-notes-container">
        </div>
    </div>
    {% endif %}

    <div class="flex items-center gap-6">
        {% if session.get('user_id') %}
            <button hx-get="/new" 
                    hx-target="#new-notes-container" 
                    hx-swap="afterbegin" 
                    class="text-gray-400 hover:text-green-400 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>

            <div class="h-4 w-[1px] bg-gray-700"></div>

            <a href="{{ url_for('auth.logout') }}" class="font-mono text-[10px] uppercase tracking-widest text-gray-500 hover:text-red-400">
                [exit_session]
            </a>
        {% endif %}
    </div>
</nav>
