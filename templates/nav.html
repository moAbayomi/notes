<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-4">
        <a href="{{ url_for('index') }}" class="font-bold text-indigo-600 text-lg tracking-tight hover:text-indigo-700 transition-colors">
            1337Notes
        </a>
        
        {% if session.get('user_id') %}
            <div class="h-4 w-[1px] bg-gray-300 mx-2"></div> <span class="text-sm text-gray-600">
                Hi, <span class="font-semibold text-gray-900">{{ session['username'] }}</span>
            </span>
        {% endif %}
    </div>

    <div class="flex items-center gap-3">
        {% if session.get('user_id') %}
            <button hx-get="/new" 
                    hx-target="#editor" 
                    hx-swap="outerHTML" 
                    type="button"
                    class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Note
            </button>

            <a href="{{ url_for('auth.logout') }}" 
               class="text-sm text-gray-500 hover:text-red-600 font-medium px-3 py-2 transition-colors">
                Logout
            </a>
        {% else %}
            <a href="{{ url_for('auth.login') }}" class="text-sm font-medium text-gray-600 hover:text-indigo-600">Login</a>
            <a href="{{ url_for('auth.register') }}" class="bg-gray-900 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-gray-800 transition-colors">Register</a>
        {% endif %}
    </div>
</nav>
