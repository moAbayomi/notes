<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-4">
        <a href="{{ url_for('index') }}" class="font-bold text-indigo-600 text-lg tracking-tight hover:text-indigo-700 transition-colors">
            1337Notes
        </a>
        {% if session.get('user_id') %}
            <div class="h-4 w-[1px] bg-gray-300 mx-2"></div> 
            <span class="text-sm text-gray-600 whitespace-nowrap">
                Hi, <span class="font-semibold text-gray-900">{{ session['username'] }}</span>
            </span>
        {% endif %}
    </div>

    {% if session.get('user_id') %}
    <div class="flex-1 max-w-md mx-8">
        <div class="relative">
            <input type="search" 
                   name="q" 
                   placeholder="Search your notes..." 
                   class="w-full bg-gray-100 border-transparent focus:bg-white focus:border-indigo-500 focus:ring-0 rounded-md py-2 pl-10 text-sm transition-all"
                   hx-get="/search" 
                   hx-trigger="keyup delay:300ms, search" 
                   hx-target="#new-notes-container" 
                   hx-indicator=".search-indicator">
            <div class="absolute left-3 top-2.5 text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-indicator htmx-indicator-none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
        </div>
    </div>
    {% endif %}

    <div class="flex items-center gap-3">
        {% if session.get('user_id') %}
            <button hx-get="/new" 
                    hx-target="#new-notes-container" 
                    hx-swap="afterbegin" 
                    ... (rest of your button) ...>
                New Note
            </button>
            ...
        {% endif %}
    </div>
</nav>
